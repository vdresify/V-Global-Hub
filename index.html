<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Pro Global | Final Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #111; }
        body { background: #000; color: #fff; margin: 0; font-family: 'Poppins', sans-serif; }
        
        /* Zabar-dasti dikhane wala system */
        #main-wrapper { display: block !important; min-height: 100vh; }
        .hidden { display: none !important; }

        .top-bar { background: var(--gold); color: #000; padding: 12px; text-align: center; font-weight: 900; font-size: 11px; }
        
        #screen-auth { padding: 80px 20px; text-align: center; }
        .card { background: var(--card); border: 1px solid #222; padding: 25px; border-radius: 20px; margin: auto; max-width: 350px; }
        .btn-gold { width: 100%; padding: 16px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 20px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; padding: 15px 0; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 20px; }
        .nav-item.active { color: var(--gold); }
        .app-page { padding: 20px 15px 100px 15px; }
    </style>
</head>
<body>

    <div id="main-wrapper">
        <div class="top-bar">V-PRO GLOBAL ACTIVE</div>

        <div id="screen-auth">
            <div class="card">
                <h1 style="color:var(--gold); margin:0;">V-PRO</h1>
                <p style="font-size:10px; color:#666;">SUPREME MULTI-SERVICE PLATFORM</p>
                <button class="btn-gold" onclick="vCore.login()">Google Sign In</button>
                <p id="status-msg" style="font-size:9px; margin-top:15px; color:var(--gold);">Waiting for Connection...</p>
            </div>
        </div>

        <div id="app-main" class="hidden">
            <section id="page-home" class="app-page">
                <div class="card" style="text-align:center;">
                    <h4 style="color:var(--gold)">HOME DASHBOARD</h4>
                    <p id="timer-txt" style="font-size:10px;">Session: 0s</p>
                </div>
            </section>

            <section id="page-wallet" class="app-page hidden">
                <div class="card" style="text-align:center;">
                    <h2 id="u-coins" style="color:var(--gold)">0</h2>
                    <p style="font-size:10px;">V-COINS</p>
                </div>
            </section>

            <section id="page-me" class="app-page hidden" style="text-align:center;">
                <img id="u-img" src="" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--gold);">
                <h2 id="u-name">---</h2>
                <div id="signin-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:15px;"></div>
            </section>
        </div>

        <nav id="nav-bar" class="bottom-nav hidden">
            <div class="nav-item active" onclick="vCore.switch('home', this)"><i class="fas fa-home"></i></div>
            <div class="nav-item" onclick="vCore.switch('wallet', this)"><i class="fas fa-wallet"></i></div>
            <div class="nav-item" onclick="vCore.switch('me', this)"><i class="fas fa-user-circle"></i></div>
        </nav>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB4Wk-096y9SAhtygKGLoJ1EHZR0WWSUOc",
            authDomain: "v-pro-global.firebaseapp.com",
            projectId: "v-pro-global",
            storageBucket: "v-pro-global.firebasestorage.app",
            messagingSenderId: "741845554827",
            appId: "1:741845554827:web:04a75d2207df326d72a68e"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const vCore = {
            login: () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()),
            switch: (id, el) => {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById('page-'+id).classList.remove('hidden');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            }
        };

        auth.onAuthStateChanged(async user => {
            const status = document.getElementById('status-msg');
            if(user) {
                status.innerText = "Authenticating User...";
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    document.getElementById('screen-auth').classList.add('hidden');
                    document.getElementById('app-main').classList.remove('hidden');
                    document.getElementById('nav-bar').classList.remove('hidden');
                    document.getElementById('u-name').innerText = doc.data().name;
                    document.getElementById('u-img').src = doc.data().profilePic || user.photoURL;
                    document.getElementById('u-coins').innerText = doc.data().vCoins || 0;
                } else {
                    await db.collection('users').doc(user.uid).set({ name: user.displayName, vCoins: 100, streak: 0, uniqueId: Math.floor(1000+Math.random()*9000) });
                    location.reload();
                }
            } else {
                status.innerText = "Ready to Login ✅";
            }
        });
    </script>
</body>
</html>
