<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Global Hub | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #0d0d0d; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: var(--white); overflow-x: hidden; }

        /* Navbar */
        nav { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: 800; color: var(--gold); letter-spacing: 2px; font-style: italic; }
        .wallet-nav { background: #111; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold); font-size: 12px; font-weight: 700; }

        .container { max-width: 500px; margin: auto; padding: 20px; }

        /* Auth Card */
        .auth-card { background: #080808; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #222; margin-top: 40px; }
        .btn-social { display: block; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-bottom: 12px; cursor: pointer; font-size: 13px; }
        .btn-google { background: #fff; color: #000; }

        /* Profile Header */
        .profile-header { display: flex; align-items: center; margin-bottom: 25px; background: #080808; padding: 15px; border-radius: 20px; border: 1px solid #111; }
        .avatar { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 15px; object-fit: cover; }
        .user-name { color: var(--gold); font-weight: 800; font-size: 18px; font-style: italic; }
        .id-badge { background: var(--gold); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 900; }

        /* Menu Items */
        .menu-grid { display: grid; gap: 12px; }
        .menu-item { background: var(--card); border: 1px solid #1a1a1a; padding: 18px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.98); border-color: var(--gold); }
        .menu-text { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        /* Form Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; display: none; overflow-y: auto; }
        .form-card { background: #080808; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); }
        input, textarea, select { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 14px; }
        .btn-submit { background: var(--gold); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; text-transform: uppercase; }

        /* Ban Screen */
        #ban-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="ban-screen">
        <h1 style="color:red; font-size: 40px;">🚫 BANNED</h1>
        <p id="ban-msg" style="margin: 20px 0; font-size: 14px; color: #888;"></p>
        <button onclick="window.location.href='https://wa.me/918808722351?text=Penalty_Unban'" class="btn-submit">Pay Penalty to Unban</button>
    </div>

    <nav>
        <div class="logo">V-GLOBAL</div>
        <div class="wallet-nav">🪙 <span id="nav-coins">0</span> V-Coins</div>
    </nav>

    <div class="container">
        
        <div id="login-section" class="auth-card">
            <h2 style="color:var(--gold); font-style:italic; margin-bottom:30px;">ACCESS V-GLOBAL</h2>
            <button onclick="loginWithGoogle()" class="btn-social btn-google">GOOGLE LOGIN</button>
            <button class="btn-social" style="background:#1877F2; color:#fff;">FACEBOOK LOGIN</button>
            <p style="color:#444; font-size:10px; margin-top:20px;">SAFE & SECURE ENCRYPTION</p>
        </div>

        <div id="dashboard-section" class="hidden">
            <div class="profile-header">
                <img id="user-img" src="" class="avatar">
                <div>
                    <p style="font-size:10px; color:#666;">PREMIUM MEMBER</p>
                    <h2 class="user-name" id="display-name">Mr. Guest</h2>
                    <span id="user-id" class="id-badge">ID: --</span>
                    <p id="strike-tag" style="color:red; font-size:9px; font-weight:bold; margin-top:5px;"></p>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="openForm('Seller')">
                    <span class="menu-text">💼 Seller Dashboard</span>
                    <span>▶</span>
                </div>
                <div class="menu-item" onclick="openForm('Model')">
                    <span class="menu-text">📸 Model Casting Hub</span>
                    <span>▶</span>
                </div>
                <div class="menu-item" onclick="openForm('Refer')">
                    <span class="menu-text">🔗 Refer & Earn</span>
                    <span>▶</span>
                </div>
                <div class="menu-item" onclick="openForm('Promotion')">
                    <span class="menu-text">🚀 YouTuber Promotion</span>
                    <span>▶</span>
                </div>
                <div class="menu-item" style="opacity:0.5;">
                    <span class="menu-text">🏆 Global Leaderboard</span>
                    <span style="font-size:9px;">Coming Soon</span>
                </div>
            </div>

            <button onclick="logout()" style="background:none; border:none; color:#444; font-size:11px; margin-top:30px; width:100%;">Logout Account</button>
        </div>
    </div>

    <div id="form-overlay" class="overlay">
        <div class="form-card">
            <h2 id="form-title" style="color:var(--gold); margin-bottom:20px; font-style:italic;"></h2>
            <div id="form-fields"></div>
            <button onclick="processSubmission()" class="btn-submit">Submit for Auto-Approval</button>
            <button onclick="closeForm()" style="background:none; border:none; color:#666; margin-top:15px; width:100%;">Cancel</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (INVOLVED) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAS_hCWbLbNfcZJ8CJOzR5OOHEhA1xcjJU",
            authDomain: "v-global-eff1e.firebaseapp.com",
            projectId: "v-global-eff1e",
            storageBucket: "v-global-eff1e.firebasestorage.app",
            messagingSenderId: "686810708424",
            appId: "1:686810708424:web:cef8d92f19a0e36ca168fd"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentType = "";
        const badWords = ["badword1", "badword2"]; // Add actual list here

        // --- AUTH LOGIC (MOBILE OPTIMIZED) ---
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider);
        }

        auth.getRedirectResult().then(async (result) => {
            if (result.user) handleUserDoc(result.user);
        });

        auth.onAuthStateChanged(user => {
            if (user) handleUserDoc(user);
            else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        async function handleUserDoc(user) {
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            
            if (!doc.exists) {
                const snap = await db.collection('users').get();
                const newId = `ID: ${(snap.size + 1).toString().padStart(2, '0')}`;
                await userRef.set({
                    uniqueId: newId, name: user.displayName, email: user.email,
                    vCoins: 50, strikes: 0, status: "Active"
                });
            } else {
                const data = doc.data();
                if (data.status === "Banned") {
                    document.getElementById('ban-screen').style.display = "flex";
                    document.getElementById('ban-msg').innerText = "Reason: Policy Violation (Strikes: " + data.strikes + "/3)";
                    return;
                }
                updateUI(data, user.photoURL);
            }
        }

        function updateUI(data, photo) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('user-id').innerText = data.uniqueId;
            document.getElementById('nav-coins').innerText = data.vCoins;
            document.getElementById('user-img').src = photo;
            document.getElementById('strike-tag').innerText = data.strikes > 0 ? `POLICY WARNINGS: ${data.strikes}/3` : "";
        }

        // --- FORM LOGIC ---
        function openForm(type) {
            currentType = type;
            document.getElementById('form-overlay').style.display = "block";
            document.getElementById('form-title').innerText = type + " Registration";
            let fields = "";
            
            if (type === 'Seller') fields = `<input id='f1' placeholder='Store/Brand Name'><textarea id='f2' placeholder='What do you sell?'></textarea>`;
            else if (type === 'Model') fields = `<input id='f1' placeholder='Portfolio Link'><textarea id='f2' placeholder='Experience Details'></textarea>`;
            else if (type === 'Refer') fields = `<p style='font-size:12px; color:#888;'>Your Code: <b>${document.getElementById('user-id').innerText}</b></p><input id='f1' placeholder='Enter Referrer ID to earn 10 coins'>`;
            else if (type === 'Promotion') fields = `<input id='f1' placeholder='YouTube Channel Link'><textarea id='f2' placeholder='Promotion Description'></textarea>`;
            
            document.getElementById('form-fields').innerHTML = fields;
        }

        function closeForm() { document.getElementById('form-overlay').style.display = "none"; }

        async function processSubmission() {
            const v1 = document.getElementById('f1').value;
            const v2 = document.getElementById('f2') ? document.getElementById('f2').value : "";
            const user = auth.currentUser;

            // Content Safety Check
            const isAbusive = badWords.some(w => v1.toLowerCase().includes(w) || v2.toLowerCase().includes(w));
            if (isAbusive) {
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                let strikes = (doc.data().strikes || 0) + 1;
                
                if (strikes >= 4) {
                    await userRef.update({ status: "Banned", strikes: strikes });
                    location.reload();
                } else {
                    await userRef.update({ strikes: strikes });
                    alert(`Strike ${strikes}/3! Abusive content found.`);
                }
                return;
            }

            // Save & Auto-Approve
            await db.collection('submissions').add({
                userId: document.getElementById('user-id').innerText,
                type: currentType,
                data: { v1, v2 },
                status: "Approved",
                time: new Date()
            });
            
            alert(currentType + " details submitted successfully!");
            closeForm();
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
