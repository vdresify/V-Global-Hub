<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Global Hub | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000000; --card-bg: #111; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--black); color: var(--white); }

        /* Navigation */
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: 2px; }

        /* USER COUNTING PANEL */
        .user-stats { background: #080808; padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 30px; text-align: center; }
        .stat-box h4 { color: var(--gold); font-size: 16px; }
        .stat-box p { font-size: 9px; color: #666; text-transform: uppercase; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Anti Hacker Ranjeet Promotion */
        .promo-banner { background: #111; border: 1px solid var(--gold); border-radius: 12px; padding: 15px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; }
        .btn-yt { background: #ff0000; color: #fff; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 11px; font-weight: 700; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .content { padding: 15px; }
        
        /* 5-STAR RATING OPTION */
        .rating-option { margin-bottom: 10px; }
        .stars { color: #333; font-size: 18px; cursor: pointer; }
        .stars span:hover, .stars span.active { color: var(--gold); }
        .rating-text { font-size: 10px; color: #555; margin-left: 5px; }

        .price { font-size: 18px; font-weight: 700; color: var(--white); margin: 10px 0; display: block; }
        .btn-buy { display: block; background: var(--gold); color: #000; text-align: center; padding: 10px; text-decoration: none; font-weight: 700; border-radius: 6px; font-size: 13px; }

        footer { padding: 30px; text-align: center; border-top: 1px solid #222; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <nav><div class="logo">V-GLOBAL HUB</div></nav>

    <div class="user-stats">
        <div class="stat-box">
            <h4 id="visitor-count">15,482</h4>
            <p>Live Visitors</p>
        </div>
        <div class="stat-box">
            <h4>5.2K+</h4>
            <p>Verified Users</p>
        </div>
    </div>

    <div class="container">
        
        <div class="promo-banner">
            <div class="promo-info">
                <h3 style="font-size:14px; color:var(--gold);">Anti Hacker Ranjeet</h3>
                <p style="font-size:10px; color:#777;">Official Partner</p>
            </div>
            <a href="https://youtube.com/@antihackeranjeet?si=u88E9xPNkomZ-ho_" target="_blank" class="btn-yt">SUBSCRIBE</a>
        </div>

        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Watch">
                <div class="content">
                    <div class="rating-option">
                        <div class="stars" onclick="markActive(this)">
                            <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
                            <span class="rating-text">Rate this</span>
                        </div>
                    </div>
                    <h3>Executive Smart Watch</h3>
                    <span class="price">₹2,499</span>
                    <a href="https://wa.me/918808722351?text=Order: Smart Watch" class="btn-buy">Buy Now</a>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Audio">
                <div class="content">
                    <div class="rating-option">
                        <div class="stars" onclick="markActive(this)">
                            <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
                            <span class="rating-text">Rate this</span>
                        </div>
                    </div>
                    <h3>JBL Pure Bass</h3>
                    <span class="price">₹1,299</span>
                    <a href="https://wa.me/918808722351?text=Order: JBL" class="btn-buy">Buy Now</a>
                </div>
            </div>

            </div>
    </div>

    <footer>
        <p>© 2026 V-GLOBAL HUB | Managed by Vinayak Jay Parkash Tiwari</p>
    </footer>

    <script>
        // Star Rating Animation
        function markActive(element) {
            const stars = element.querySelectorAll('span');
            stars.forEach(star => star.style.color = '#D4AF37');
            alert("Thanks for your 5-star rating!");
        }

        // Live Visitor Counter Logic
        let count = 15482;
        setInterval(() => {
            count += Math.floor(Math.random() * 2);
            document.getElementById('visitor-count').innerText = count.toLocaleString();
        }, 3000);
    </script>

</body>
</html>
