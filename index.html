<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Global Hub | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #111; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: var(--white); text-align: center; }

        /* Navbar */
        nav { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 2px; }
        .wallet-nav { background: #111; padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); font-size: 13px; }

        /* UI Containers */
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .card { background: #080808; padding: 30px; border-radius: 25px; border: 1px solid #222; margin-top: 30px; }
        
        /* Buttons */
        .btn-gold { background: linear-gradient(145deg, #D4AF37, #8A6D3B); color: #000; padding: 15px; border: none; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-google { background: white; color: black; margin-bottom: 10px; }
        
        /* Dashboard Items */
        .menu-item { background: #0d0d0d; border: 1px solid #222; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .menu-text { font-size: 13px; font-weight: 700; color: var(--gold); }
        .strike-badge { color: #ff4444; font-size: 10px; font-weight: bold; margin-top: 5px; display: block; }

        .hidden { display: none; }
        input, textarea { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">V-GLOBAL</div>
        <div class="wallet-nav">🪙 <span id="nav-coins">0</span> V-Coins</div>
    </nav>

    <div class="container">
        
        <div id="login-screen" class="card">
            <h2 style="color:var(--gold); font-style:italic; margin-bottom:20px;">ACCESS V-GLOBAL</h2>
            <button onclick="loginWithGoogle()" class="btn-gold btn-google">LOGIN WITH GOOGLE</button>
            <p style="color:#444; font-size:12px;">Premium Secure Access</p>
        </div>

        <div id="dashboard-screen" class="hidden">
            <div style="display:flex; align-items:center; margin-bottom:25px; text-align:left;">
                <img id="user-img" src="" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); margin-right:15px;">
                <div>
                    <p style="font-size:12px; color:#888;">WELCOME,</p>
                    <h2 id="display-name" style="color:var(--gold); font-style:italic;">Mr. Guest</h2>
                    <span id="user-id-tag" style="color:var(--gold); font-weight:bold; font-size:12px;">ID: --</span>
                    <span id="strike-info" class="strike-badge"></span>
                </div>
            </div>

            <div class="menu-item" onclick="openForm('Seller')">
                <span class="menu-text">💼 SELLER DASHBOARD</span>
                <span>▶</span>
            </div>
            <div class="menu-item" onclick="openForm('Model')">
                <span class="menu-text">📸 MODEL CASTING HUB</span>
                <span>▶</span>
            </div>
            <div class="menu-item" onclick="alert('Referral Code: ' + currentUID)">
                <span class="menu-text">🔗 REFER & EARN</span>
                <span>▶</span>
            </div>
            <div class="menu-item">
                <span class="menu-text">🚀 YOUTUBERS PROMOTION</span>
                <span>▶</span>
            </div>

            <button onclick="logout()" style="background:none; border:none; color:red; font-size:11px; margin-top:20px; cursor:pointer;">LOGOUT ACCOUNT</button>
        </div>

        <div id="form-section" class="card hidden">
            <h3 id="form-title" style="color:var(--gold); margin-bottom:15px;">SUBMIT DETAILS</h3>
            <input type="text" id="form-subject" placeholder="Title/Name">
            <textarea id="form-desc" rows="4" placeholder="Description (Be careful with words...)"></textarea>
            <button onclick="submitData()" class="btn-gold">SUBMIT FOR AUTO-APPROVAL</button>
            <button onclick="closeForm()" style="background:none; border:none; color:#666; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION (INVOLVED) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAS_hCWbLbNfcZJ8CJOzR5OOHEhA1xcjJU",
            authDomain: "v-global-eff1e.firebaseapp.com",
            projectId: "v-global-eff1e",
            storageBucket: "v-global-eff1e.firebasestorage.app",
            messagingSenderId: "686810708424",
            appId: "1:686810708424:web:cef8d92f19a0e36ca168fd"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUID = "";
        let currentFormType = "";
        const badWords = ["badword1", "badword2"]; // Add your list here

        // --- 2. AUTH FUNCTIONS ---
        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                
                if (!doc.exists) {
                    const snap = await db.collection('users').get();
                    const newId = `ID: ${(snap.size + 1).toString().padStart(2, '0')}`;
                    await userRef.set({
                        uniqueId: newId, name: user.displayName, email: user.email,
                        vCoins: 50, strikes: 0, status: "Active"
                    });
                }
            } catch (error) { alert(error.message); }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                const data = doc.data();
                
                if (data.status === "Banned") {
                    document.body.innerHTML = `<h1 style="margin-top:100px; color:gold;">🚫 BANNED<br><span style="font-size:14px; color:white;">Penalty needed to unban.</span></h1>`;
                    return;
                }

                currentUID = data.uniqueId;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                document.getElementById('display-name').innerText = data.name;
                document.getElementById('user-id-tag').innerText = data.uniqueId;
                document.getElementById('nav-coins').innerText = data.vCoins;
                document.getElementById('user-img').src = user.photoURL;
                document.getElementById('strike-info').innerText = data.strikes > 0 ? `Warnings: ${data.strikes}/3` : "";
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('dashboard-screen').classList.add('hidden');
            }
        });

        // --- 3. LOGIC & STRIKE SYSTEM ---
        function openForm(type) {
            currentFormType = type;
            document.getElementById('form-title').innerText = type + " Registration";
            document.getElementById('dashboard-screen').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
        }

        function closeForm() {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
        }

        async function submitData() {
            const desc = document.getElementById('form-desc').value;
            const user = auth.currentUser;
            
            // Abusive Language Check
            let isAbusive = badWords.some(word => desc.toLowerCase().includes(word));
            if (isAbusive) {
                const userRef = db.collection('users').doc(user.uid);
                const doc = await userRef.get();
                let strikes = (doc.data().strikes || 0) + 1;
                
                if (strikes >= 4) {
                    await userRef.update({ status: "Banned", strikes: strikes });
                    location.reload();
                } else {
                    await userRef.update({ strikes: strikes });
                    alert(`Strike ${strikes}/3! Abusive language not allowed.`);
                }
                return;
            }

            // Save Data
            await db.collection('submissions').add({
                userId: currentUID,
                type: currentFormType,
                content: desc,
                status: "Approved", // Auto-approved as requested
                time: new Date()
            });
            alert("Success! Your " + currentFormType + " profile is live.");
            closeForm();
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
