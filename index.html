<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V-Pro Global | Master Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        :root { --gold: #D4AF37; --gold-grad: linear-gradient(135deg, #D4AF37 0%, #F1D279 50%, #B49235 100%); --black: #000; --card: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: #fff; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* NOTIFICATION SYSTEM */
        #v-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold-grad); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 800; font-size: 11px; z-index: 5000; opacity: 0; pointer-events: none; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* UI ELEMENTS */
        .container { padding: 20px; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 15px; position: relative; }
        .btn-gold { background: var(--gold-grad); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px; }
        .input-group { background: #080808; border: 1px solid #333; padding: 12px; border-radius: 15px; color: #fff; margin: 10px 0; width: 100%; }

        /* NAVIGATION */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.95); display: flex; border-top: 1px solid #1a1a1a; z-index: 1000; padding-bottom: 10px; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 20px; }
        .nav-link.active { color: var(--gold); }
        .nav-link span { font-size: 9px; font-weight: 700; margin-top: 4px; }

        /* FOUNDER SPECIAL */
        .king-aura { border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold); animation: king-glow 2s infinite; }
        @keyframes king-glow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 35px var(--gold); } }
    </style>
</head>
<body>

    <div id="v-alert">V-PRO SYSTEM ACTIVE</div>

    <div id="main-app">
        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1a1a;">
            <div style="font-weight: 900; color: var(--gold); letter-spacing: 2px;" onclick="vCore.godGate()">V-PRO GLOBAL</div>
            <i class="fas fa-bolt" style="color: var(--gold);"></i>
        </div>

        <div class="container">
            <section id="pg-home" class="page">
                <div class="card">
                    <p style="color: #555; font-size: 10px; font-weight: 800;">TOTAL SESSION TIME</p>
                    <h2 id="timer-val" style="font-size: 32px; color: var(--gold);">00:00:00</h2>
                </div>
                
                <div class="card">
                    <h4 style="margin-bottom:10px;">🏆 LUCKY DRAW</h4>
                    <p style="font-size:10px; color:#777;">Entry: 100 V-Coins</p>
                    <button class="btn-gold" style="margin-top:10px; padding:10px;" onclick="vCore.joinDraw()">JOIN DRAW</button>
                </div>

                <div class="card">
                    <h4 style="margin-bottom:10px;">SHOP (V-DRESIFY)</h4>
                    <div style="display:flex; gap:10px; overflow-x:scroll;">
                        <div style="min-width:140px; height:180px; background:#000; border-radius:15px; border:1px solid #222; display:flex; align-items:center; justify-content:center;">WATCHES</div>
                        <div style="min-width:140px; height:180px; background:#000; border-radius:15px; border:1px solid #222; display:flex; align-items:center; justify-content:center;">DRESSES</div>
                    </div>
                </div>
            </section>

            <section id="pg-wallet" class="page hidden">
                <div class="card" style="text-align:center;">
                    <p style="font-size:11px; color:#888;">CURRENT BALANCE</p>
                    <h1 id="bal-txt" style="font-size:50px; color:var(--gold);">0</h1>
                </div>
                <div class="card">
                    <h4>SEND COINS</h4>
                    <input type="text" id="tx-id" class="input-group" placeholder="Target VPG-ID">
                    <input type="number" id="tx-amt" class="input-group" placeholder="Amount">
                    <button class="btn-gold" onclick="vCore.sendCoins()">TRANSFER NOW</button>
                </div>
            </section>

            <section id="pg-me" class="page hidden">
                <div style="text-align:center; margin-bottom:20px;">
                    <img id="u-img" src="" style="width:120px; height:120px; border-radius:50%; object-fit:cover;">
                    <h2 id="u-name" style="margin-top:10px;">---</h2>
                    <p id="vpg-id-txt" style="color:var(--gold); font-weight:800; font-size:12px;"></p>
                </div>
                <div class="card">
                    <p style="font-size:11px; margin-bottom:10px;">8-DAY STREAK REWARD</p>
                    <div id="streak-box" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div>
                    <button id="claim-btn" class="btn-gold hidden" style="margin-top:15px;" onclick="vCore.claimReward()">CLAIM 50 COINS</button>
                </div>
            </section>

            <section id="pg-god" class="page hidden">
                <div class="card" style="border-color: red;">
                    <h3 style="color: red;">SUPREME CONTROL</h3>
                    <input type="text" id="target-ban" class="input-group" placeholder="Enter VPG-ID to Ban">
                    <button class="btn-gold" style="background:red; color:white;" onclick="vCore.adminAction('ban')">BAN ACCOUNT</button>
                    <button class="btn-gold" style="background:green; color:white; margin-top:10px;" onclick="vCore.adminAction('unban')">UNBAN ACCOUNT</button>
                    <hr style="margin:20px 0; border:0.5px solid #222;">
                    <button class="btn-gold" style="background:white; color:black;" onclick="vCore.resetDraw()">RESET LUCKY DRAW</button>
                </div>
            </section>
        </div>
    </div>

    <nav class="nav" id="bot-nav">
        <div class="nav-link active" onclick="vCore.tab('home', this)"><i class="fas fa-th-large"></i><span>DASHBOARD</span></div>
        <div class="nav-link" onclick="vCore.tab('wallet', this)"><i class="fas fa-wallet"></i><span>WALLET</span></div>
        <div class="nav-link" onclick="vCore.tab('me', this)"><i class="fas fa-crown"></i><span>ME</span></div>
    </nav>

    <script>
        // FIREBASE SETUP
        const fbConfig = {
            apiKey: "AIzaSyB4Wk-096y9SAhtygKGLoJ1EHZR0WWSUOc",
            authDomain: "v-pro-global.firebaseapp.com",
            projectId: "v-pro-global",
            storageBucket: "v-pro-global.appspot.com",
            messagingSenderId: "741845554827",
            appId: "1:741845554827:web:04a75d2207df326d72a68e"
        };
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        const vCore = {
            user: null, time: 0, taps: 0,
            
            showMsg: function(m) {
                const a = document.getElementById('v-alert');
                a.innerText = m; a.style.opacity = '1';
                setTimeout(() => a.style.opacity = '0', 3000);
            },

            tab: function(id, el) {
                document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
                document.getElementById('pg-' + id).classList.remove('hidden');
                document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
                el.classList.add('active');
            },

            init: function(data) {
                this.user = data;
                document.getElementById('u-name').innerText = data.name;
                document.getElementById('vpg-id-txt').innerText = "VPG-" + data.uniqueId;
                document.getElementById('bal-txt').innerText = data.vCoins || 0;
                document.getElementById('u-img').src = auth.currentUser.photoURL;

                // Founder Check
                if(auth.currentUser.email === "dreamchat26@gmail.com") {
                    document.getElementById('u-img').classList.add('king-aura');
                }

                this.startTimer();
                this.renderStreaks();
            },

            startTimer: function() {
                setInterval(() => {
                    this.time++;
                    let h = Math.floor(this.time/3600).toString().padStart(2,'0');
                    let m = Math.floor((this.time%3600)/60).toString().padStart(2,'0');
                    let s = (this.time%60).toString().padStart(2,'0');
                    document.getElementById('timer-val').innerText = `${h}:${m}:${s}`;
                    
                    if(this.time % 600 === 0) { // Har 10 min par coin credit
                        db.collection('users').doc(auth.currentUser.uid).update({ vCoins: firebase.firestore.FieldValue.increment(70) });
                        this.showMsg("Session Bonus: +70 Coins!");
                    }
                }, 1000);
            },

            sendCoins: async function() {
                const target = document.getElementById('tx-id').value;
                const amt = parseInt(document.getElementById('tx-amt').value);
                if(this.user.vCoins < amt) return alert("Not enough coins!");

                const snap = await db.collection('users').where('uniqueId', '==', parseInt(target)).get();
                if(!snap.empty) {
                    const batch = db.batch();
                    batch.update(db.collection('users').doc(auth.currentUser.uid), { vCoins: firebase.firestore.FieldValue.increment(-amt) });
                    batch.update(snap.docs[0].ref, { vCoins: firebase.firestore.FieldValue.increment(amt) });
                    await batch.commit();
                    this.showMsg("Transfer Successful!");
                    location.reload();
                } else { alert("User ID not found!"); }
            },

            claimReward: async function() {
                await db.collection('users').doc(auth.currentUser.uid).update({ 
                    vCoins: firebase.firestore.FieldValue.increment(50),
                    streak: (this.user.streak || 0) + 1,
                    lastClaimed: new Date().toDateString()
                });
                this.showMsg("Day Reward Claimed!");
                location.reload();
            },

            renderStreaks: function() {
                const box = document.getElementById('streak-box'); box.innerHTML = "";
                for(let i=1; i<=8; i++) {
                    const d = document.createElement('div');
                    d.style = `padding:10px; border-radius:10px; text-align:center; font-size:10px; border:1px solid ${this.user.streak >= i ? 'var(--gold)' : '#222'}`;
                    d.innerText = "Day " + i;
                    if(this.user.streak >= i) d.style.background = "rgba(212,175,55,0.2)";
                    box.appendChild(d);
                }
                if(this.user.lastClaimed !== new Date().toDateString()) document.getElementById('claim-btn').classList.remove('hidden');
            },

            godGate: function() {
                this.taps++;
                if(this.taps >= 7 && auth.currentUser.email === "dreamchat26@gmail.com") this.tab('god', {classList:{add:()=>{},remove:()=>{}}});
            },

            adminAction: async function(type) {
                const id = document.getElementById('target-ban').value;
                const snap = await db.collection('users').where('uniqueId', '==', parseInt(id)).get();
                if(!snap.empty) {
                    await snap.docs[0].ref.update({ isBanned: type === 'ban' });
                    this.showMsg("Action Applied!");
                }
            }
        };

        // AUTH LISTENER
        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    if(doc.data().isBanned) { document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>ACCESS DENIED: BANNED</h1>"; return; }
                    vCore.init(doc.data());
                } else {
                    const vid = Math.floor(1000 + Math.random()*9000);
                    await db.collection('users').doc(user.uid).set({ name: user.displayName, uniqueId: vid, vCoins: 100, streak: 0, lastClaimed: "", isBanned: false });
                    location.reload();
                }
            } else {
                auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            }
        });
    </script>
</body>
</html>
