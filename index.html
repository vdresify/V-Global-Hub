<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Global Hub | Premium Global Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --card: #111; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--black); color: var(--white); }

        /* Navigation & Social Sidebar */
        nav { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 26px; font-weight: 800; color: var(--gold); letter-spacing: 4px; }
        
        .social-sidebar { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 1001; display: flex; flex-direction: column; }
        .social-icon { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 14px; margin-bottom: 2px; border-radius: 0 5px 5px 0; font-weight: bold; }
        .wa { background: #25D366; } .ig { background: #E1306C; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* User Counter */
        .user-panel { background: #080808; padding: 15px; border-radius: 15px; border: 1px solid #222; margin-bottom: 30px; display: flex; justify-content: space-around; text-align: center; }
        .stat h3 { color: var(--gold); font-size: 20px; }
        .stat p { font-size: 9px; color: #666; text-transform: uppercase; }

        /* Full YouTuber Promotion Grid */
        .promo-section { margin-bottom: 40px; }
        .promo-title { color: var(--gold); font-size: 12px; letter-spacing: 3px; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        .ad-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .ad-card { background: #111; padding: 20px; border: 1px solid #333; border-radius: 12px; text-align: center; }
        .ad-card.main { border: 2px solid var(--gold); }
        .yt-name { color: var(--gold); font-weight: 700; display: block; margin-bottom: 10px; }
        .btn-yt { background: #ff0000; color: #fff; padding: 6px 15px; border-radius: 4px; text-decoration: none; font-size: 11px; font-weight: 700; }

        /* 15 Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .product { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.4s; }
        .product:hover { border-color: var(--gold); transform: translateY(-10px); }
        .product img { width: 100%; height: 280px; object-fit: cover; }
        .details { padding: 20px; }
        .details h3 { font-size: 18px; margin-bottom: 8px; }
        .desc { font-size: 12px; color: #888; margin-bottom: 15px; height: 40px; overflow: hidden; }
        .price { font-size: 22px; font-weight: 700; color: var(--gold); display: block; margin-bottom: 15px; }

        /* Rating System */
        .rating { color: #333; font-size: 20px; cursor: pointer; margin-bottom: 15px; }
        .rating span.active { color: var(--gold); }

        .btn-buy { display: block; width: 100%; padding: 15px; background: var(--gold); color: #000; text-align: center; text-decoration: none; font-weight: 800; border-radius: 10px; text-transform: uppercase; }

        footer { padding: 50px; text-align: center; border-top: 2px solid #111; margin-top: 50px; background: #050505; }
    </style>
</head>
<body>

    <div class="social-sidebar">
        <a href="https://wa.me/918808722351" class="social-icon wa">WA</a>
        <a href="https://www.instagram.com/vin_ayak703" class="social-icon ig">IG</a>
    </div>

    <nav><div class="logo">V-GLOBAL HUB</div></nav>

    <div class="container">
        
        <div class="user-panel">
            <div class="stat"><h3 id="count">15,482</h3><p>Live Visitors</p></div>
            <div class="stat"><h3>5,200+</h3><p>Verified Users</p></div>
            <div class="stat"><h3>100%</h3><p>Secure Hub</p></div>
        </div>

        <div class="promo-section">
            <p class="promo-title">Featured Promotion Partners</p>
            <div class="ad-grid">
                <div class="ad-card main">
                    <span class="yt-name">Anti Hacker Ranjeet</span>
                    <a href="https://youtube.com/@antihackeranjeet?si=u88E9xPNkomZ-ho_" class="btn-yt" target="_blank">SUBSCRIBE</a>
                </div>
                <div class="ad-card">
                    <span class="yt-name">Technical Guruji</span>
                    <a href="#" class="btn-yt">PROMOTED</a>
                </div>
                <div class="ad-card">
                    <span class="yt-name">Flying Beast</span>
                    <a href="#" class="btn-yt">PROMOTED</a>
                </div>
                <div class="ad-card">
                    <span class="yt-name">ABP News</span>
                    <a href="#" class="btn-yt">FEATURED</a>
                </div>
            </div>
        </div>

        <div class="grid" id="product-list">
            </div>

    </div>

    <footer>
        <p style="color:var(--gold); margin-bottom:10px; font-size:16px; font-weight:700;">V-GLOBAL HUB OFFICIAL</p>
        <p style="color:#444; font-size:11px;">&copy; 2026 Vinayak Jay Parkash Tiwari | Premium Quality Brand</p>
    </footer>

    <script>
        // Full Product Data (15 Items)
        const products = [
            { name: "Executive Smart Watch", price: "₹2,499", desc: "Premium calling & health tracking features.", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" },
            { name: "JBL Pure Bass Earphones", price: "₹1,299", desc: "Deep bass, noise cancellation, official JBL sound.", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" },
            { name: "Premium Cotton Shirt", price: "₹899", desc: "100% Cotton, slim-fit luxury formal wear.", img: "https://images.unsplash.com/photo-1596755094514-f87034a264c6?w=500" },
            { name: "Slim Fit Chinos Pant", price: "₹1,199", desc: "Stretchable fabric for professional comfort.", img: "https://images.unsplash.com/photo-1624371414361-e6e8ea0c3535?w=500" },
            { name: "Sporty Running Shoes", price: "₹1,999", desc: "Ultra-lightweight sole for athletic performance.", img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" },
            { name: "Couple Ethnic Set", price: "₹4,499", desc: "Matching designer wear for royal couples.", img: "https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=500" },
            { name: "Gold Plated Royal Ring", price: "₹599", desc: "Pure 24K plating with classic premium finish.", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=500" },
            { name: "Urban White Sneakers", price: "₹1,499", desc: "Minimalist design for the modern street style.", img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=500" },
            { name: "Oversized Graphic Tee", price: "₹699", desc: "Heavy fabric cotton with viral print designs.", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" },
            { name: "Luxury Couple Watch Set", price: "₹3,999", desc: "Twin watches designed for lasting relationships.", img: "https://images.unsplash.com/photo-1508685096489-7aac291ba597?w=500" },

            { name: "Leather Formal Belt", price: "₹499", desc: "Genuine leather with auto-lock gold buckle.", img: "https://images.unsplash.com/photo-1624222247344-550fb8ee97ed?w=500" },
            { name: "Couple Hoodies (Set of 2)", price: "₹2,299", desc: "Soft fleece fabric with 'King & Queen' print.", img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500" },
            { name: "Signature Mens Perfume", price: "₹799", desc: "Long-lasting musk fragrance for men.", img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=500" }
        ];

        const container = document.getElementById('product-list');
        products.forEach(p => {
            container.innerHTML += `
                <div class="product">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="details">
                        <div class="rating"><span onclick="this.classList.add('active')">★ ★ ★ ★ ★</span></div>
                        <h3>${p.name}</h3>
                        <p class="desc">${p.desc}</p>
                        <span class="price">${p.price}</span>
                        <a href="https://wa.me/918808722351?text=Order: ${p.name}" class="btn-buy">Buy Now</a>
                    </div>
                </div>
            `;
        });

        // Visitor Counter
        let c = 15482;
        setInterval(() => { c += Math.floor(Math.random() * 3); document.getElementById('count').innerText = c.toLocaleString(); }, 2000);
    </script>
</body>
</html>
