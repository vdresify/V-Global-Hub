<div class="side-menu" id="side-menu">
        <h3 style="color:var(--gold); margin-bottom: 20px;">V-PRO SERVICES</h3>
        
        <div id="god-opt" class="menu-item hidden" onclick="core.switch('god')">
            <i class="fas fa-crown"></i> Master Control (God)
        </div>
        
        <div id="mgr-opt" class="menu-item hidden" onclick="core.switch('god')">
            <i class="fas fa-tasks"></i> Manager Panel
        </div>

        <div class="menu-item"><i class="fas fa-magic"></i> Smart Select</div>
        <div class="menu-item"><i class="fas fa-gift"></i> Lucky Draw</div>
        <div class="menu-item" onclick="authMod.logout()"><i class="fas fa-sign-out-alt"></i> Logout</div>
    </div>

    <div id="screen-auth" class="app-page" style="text-align: center; padding-top: 100px;">
        <div class="card">
            <h2 style="color:var(--gold); margin-bottom: 20px;">V-PRO GLOBAL</h2>
            <p style="font-size: 12px; margin-bottom: 20px;">Please Login to Access Services</p>
            <button class="btn-gold" onclick="authMod.google()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:15px; vertical-align:middle; margin-right:10px;">
                SIGN IN WITH GOOGLE
            </button>
        </div>
    </div>

    <div id="app-main" class="hidden">
        </div>

    <script>
        // ... Firebase Config ...

        const core = {
            init: (data) => {
                userData = data;
                // UI update logic...
                
                // --- ROLE CHECK ---
                if(auth.currentUser.email === "dreamchat26@gmail.com") {
                    document.getElementById('god-opt').classList.remove('hidden');
                }
                if(data.role === "Manager") {
                    document.getElementById('mgr-opt').classList.remove('hidden');
                }

                document.getElementById('screen-auth').classList.add('hidden');
                document.getElementById('app-main').classList.remove('hidden');
                document.getElementById('nav-bar').classList.remove('hidden');
            }
        };

        const authMod = {
            google: () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                auth.signInWithPopup(provider).catch(err => alert("Popup Blocked! Please allow popups."));
            },
            logout: () => auth.signOut().then(() => location.reload())
        };

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    core.init(doc.data());
                } else {
                    const vid = "VPG-" + Math.floor(1000 + Math.random()*9000);
                    await db.collection('users').doc(user.uid).set({ 
                        name: user.displayName, 
                        role: "User", // Default role
                        uniqueId: vid, 
                        vCoins: 100,
                        streak: 0 
                    });
                    location.reload();
                }
            } else {
                document.getElementById('screen-auth').classList.remove('hidden');
                document.getElementById('app-main').classList.add('hidden');
                document.getElementById('nav-bar').classList.add('hidden');
            }
        });
    </script>
